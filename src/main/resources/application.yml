spring:
  application:
    name: kcalBackend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:kcal_mock;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  docker:
    compose:
      enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${SERVER_PORT:8081}
  address: ${SERVER_ADDRESS:0.0.0.0}
  ssl:
    enabled: ${SERVER_SSL_ENABLED:true}
    key-store: ${SERVER_SSL_KEY_STORE:classpath:kcal.p12}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:changeit}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SERVER_SSL_KEY_ALIAS:kcal}

app:
  jwt:
    secret: ${JWT_SECRET:VitalityPeakDevelopmentSecretKeyForJwtTokenSigningChangeMe12345}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://127.0.0.1:5173,https://localhost:5173,http://127.0.0.1:5173,http://localhost:5173}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://localhost:*,https://127.0.0.1:*,https://192.168.*.*:*,http://localhost:*,http://127.0.0.1:*,http://192.168.*.*:*}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
