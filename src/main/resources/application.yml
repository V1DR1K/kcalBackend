spring:
  application:
    name: kcalBackend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/kcal_db}
    username: ${SPRING_DATASOURCE_USERNAME:kcal_user}
    password: ${SPRING_DATASOURCE_PASSWORD:kcal_password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  docker:
    compose:
      enabled: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:VitalityPeakDevelopmentSecretKeyForJwtTokenSigningChangeMe12345}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
