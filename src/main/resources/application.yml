spring:
  application:
    name: kcalBackend
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/kcal_db}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:kcal_user}
    password: ${SPRING_DATASOURCE_PASSWORD:kcal_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  docker:
    compose:
      enabled: false
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8081}
  address: ${SERVER_ADDRESS:0.0.0.0}
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}

app:
  email:
    from: ${APP_EMAIL_FROM:}
  auth:
    registration-enabled: ${APP_AUTH_REGISTRATION_ENABLED:true}
  seed:
    catalog-enabled: ${APP_SEED_CATALOG_ENABLED:true}
    demo-users-enabled: ${APP_SEED_DEMO_USERS_ENABLED:true}
  jwt:
    secret: ${JWT_SECRET:VitalityPeakDevelopmentSecretKeyForJwtTokenSigningChangeMe12345}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:0}
  food-lookup:
    enabled: ${FOOD_LOOKUP_ENABLED:true}
    timeout: ${FOOD_LOOKUP_TIMEOUT:3s}
    open-food-facts:
      base-url: ${OPEN_FOOD_FACTS_BASE_URL:https://world.openfoodfacts.org}
      user-agent: ${OPEN_FOOD_FACTS_USER_AGENT:KazaFitness/0.1 (development; contact@kazadesarrollos.com)}
    usda:
      base-url: ${USDA_FOOD_DATA_BASE_URL:https://api.nal.usda.gov/fdc}
      api-key: ${USDA_FOOD_DATA_API_KEY:}
  catalog-import:
    enabled: ${APP_CATALOG_IMPORT_ENABLED:false}
    brands: ${APP_CATALOG_IMPORT_BRANDS:Coca-Cola,Mogul,Milka,Fantoche,Ciudad del Lago,Arcor,Bagley,Terrabusi,Havanna,Guaymallen,Jorgito,Bon o Bon,Cofler,Aguila,Don Satur,Pepitos,Sonrisas,Tita,Rhodesia,La Serenisima,Pepsi}
    pages-per-brand: ${APP_CATALOG_IMPORT_PAGES_PER_BRAND:3}
    page-size: ${APP_CATALOG_IMPORT_PAGE_SIZE:100}
    delay-millis: ${APP_CATALOG_IMPORT_DELAY_MILLIS:6500}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://127.0.0.1:5173,https://localhost:5173,http://127.0.0.1:5173,http://localhost:5173}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://localhost:*,https://127.0.0.1:*,https://192.168.*.*:*,http://localhost:*,http://127.0.0.1:*,http://192.168.*.*:*}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
