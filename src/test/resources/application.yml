spring:
  datasource:
    url: jdbc:h2:mem:kcal_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop

app:
  jwt:
    secret: TestSecretKeyForJwtTokenSigningThatIsLongEnough123456789
    expiration-minutes: 60
  cors:
    allowed-origins: http://localhost:5173
    allowed-origin-patterns: http://localhost:*,http://127.0.0.1:*
