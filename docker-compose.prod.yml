name: kcals

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      internal:
        aliases: [kcals-postgres]

  app:
    build:
      context: .
      args:
        GIT_HASH: ${GIT_HASH:-unknown}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://kcals-postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_SSL_ENABLED: "false"
      CORS_ALLOWED_ORIGINS: https://${KCALS_DOMAIN}
      CORS_ALLOWED_ORIGIN_PATTERNS: ""
      APP_SEED_DEMO_USERS_ENABLED: "false"
      APP_EMAIL_FROM: ${APP_EMAIL_FROM}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/api/health"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      internal: {}
      edge:
        aliases: [kcals-app]

  prometheus:
    image: prom/prometheus:v3.4.1
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=30d"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks: [internal]

  frontend:
    build:
      context: ../kcalFrontend
      args:
        GIT_HASH: ${GIT_HASH:-unknown}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      internal: {}
      edge:
        aliases: [kcals-frontend]

volumes:
  postgres_data:
  prometheus_data:

networks:
  internal:
    internal: true
  edge:
    external: true
    name: kaza_default
